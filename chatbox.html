<!-- chatbox.html - SIRF HTML + CSS (NO JAVASCRIPT) -->
<style>
    /* ===== CHATBOX CSS ===== */
    .chatbox-button {
        position: fixed;
        bottom: 30px;
        right: 30px;
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: #00d9ff;
        border: none;
        font-size: 30px;
        cursor: pointer;
        box-shadow: 0 4px 20px rgba(0, 217, 255, 0.4);
        z-index: 9999;
        transition: 0.3s;
    }

    .chatbox-button:hover {
        transform: scale(1.1);
        box-shadow: 0 8px 30px rgba(0, 217, 255, 0.6);
    }

    .chat-window {
        position: fixed;
        bottom: 100px;
        right: 30px;
        width: 380px;
        height: 500px;
        background: #13131a;
        border: 1px solid rgba(0, 217, 255, 0.3);
        border-radius: 16px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
        z-index: 9998;
        display: none;
        flex-direction: column;
        overflow: hidden;
        backdrop-filter: blur(10px);
    }

    .chat-window.open {
        display: flex;
    }

    .chat-header {
        padding: 16px 20px;
        background: #00d9ff;
        color: #0a0a0f;
        font-weight: 600;
        display: flex;
        justify-content: space-between;
        align-items: center;
        cursor: pointer;
    }

    .chat-close {
        background: none;
        border: none;
        font-size: 20px;
        cursor: pointer;
        color: #0a0a0f;
    }

    .chat-messages {
        flex: 1;
        padding: 16px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .message {
        max-width: 80%;
        padding: 10px 14px;
        border-radius: 12px;
        font-size: 14px;
        line-height: 1.5;
    }

    .message.user {
        align-self: flex-end;
        background: #00d9ff;
        color: #0a0a0f;
        border-bottom-right-radius: 4px;
    }

    .message.bot {
        align-self: flex-start;
        background: rgba(255, 255, 255, 0.08);
        color: #e4e4e7;
        border-bottom-left-radius: 4px;
    }

    .message.system {
        align-self: center;
        background: rgba(0, 255, 136, 0.15);
        color: #00ff88;
        font-size: 13px;
        padding: 8px 16px;
        border-radius: 20px;
        max-width: 90%;
        text-align: center;
    }

    .chat-input-area {
        padding: 12px 16px;
        border-top: 1px solid rgba(255, 255, 255, 0.06);
        display: flex;
        gap: 10px;
        background: rgba(19, 19, 26, 0.95);
    }

    .chat-input {
        flex: 1;
        padding: 10px 14px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.05);
        color: #e4e4e7;
        font-size: 14px;
        outline: none;
        transition: 0.3s;
    }

    .chat-input:focus {
        border-color: #00d9ff;
        box-shadow: 0 0 20px rgba(0, 217, 255, 0.1);
    }

    .chat-send {
        padding: 10px 20px;
        background: #00d9ff;
        color: #0a0a0f;
        border: none;
        border-radius: 10px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s;
    }

    .chat-send:hover {
        background: #00ff88;
        transform: scale(1.02);
    }

    .chat-send:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
    }

    .mode-selection {
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        text-align: center;
    }

    .mode-btn {
        padding: 14px;
        border: 2px solid rgba(0, 217, 255, 0.3);
        border-radius: 12px;
        background: transparent;
        color: #e4e4e7;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
    }

    .mode-btn:hover {
        background: rgba(0, 217, 255, 0.1);
        border-color: #00d9ff;
        transform: translateY(-2px);
    }

    .contact-form {
        display: none;
        padding: 20px;
        flex-direction: column;
        gap: 14px;
    }

    .contact-form.active {
        display: flex;
    }

    .contact-form input,
    .contact-form textarea {
        padding: 12px 14px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        color: #e4e4e7;
        font-size: 14px;
        outline: none;
        transition: 0.3s;
        font-family: inherit;
    }

    .contact-form input:focus,
    .contact-form textarea:focus {
        border-color: #00d9ff;
        box-shadow: 0 0 20px rgba(0, 217, 255, 0.1);
    }

    .contact-form textarea {
        min-height: 80px;
        resize: vertical;
    }

    .contact-form .send-btn {
        padding: 12px;
        background: #00d9ff;
        color: #0a0a0f;
        border: none;
        border-radius: 10px;
        font-weight: 600;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    .contact-form .send-btn:hover {
        background: #00ff88;
    }

    .contact-form .send-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }

    .back-btn {
        background: none;
        border: none;
        color: #00d9ff;
        cursor: pointer;
        font-size: 14px;
        padding: 4px 0;
        margin-bottom: 10px;
        font-weight: 500;
    }

    .back-btn:hover {
        color: #00ff88;
    }

    /* Light Mode */
    body.light-mode .chat-window {
        background: #ffffff;
        border-color: rgba(0, 217, 255, 0.2);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
    }

    body.light-mode .message.bot {
        background: #f0f0f0;
        color: #1a1a1a;
    }

    body.light-mode .message.system {
        background: rgba(0, 255, 136, 0.1);
        color: #0077ff;
    }

    body.light-mode .chat-input-area {
        background: #f8f8f8;
        border-top-color: rgba(0, 0, 0, 0.06);
    }

    body.light-mode .chat-input {
        background: #ffffff;
        color: #1a1a1a;
        border-color: rgba(0, 0, 0, 0.1);
    }

    body.light-mode .chat-input:focus {
        border-color: #00d9ff;
    }

    body.light-mode .mode-btn {
        color: #1a1a1a;
        border-color: rgba(0, 0, 0, 0.1);
    }

    body.light-mode .mode-btn:hover {
        background: rgba(0, 217, 255, 0.1);
        border-color: #00d9ff;
    }

    body.light-mode .contact-form input,
    body.light-mode .contact-form textarea {
        background: #ffffff;
        color: #1a1a1a;
        border-color: rgba(0, 0, 0, 0.1);
    }

    /* Mobile */
    @media (max-width: 480px) {
        .chat-window {
            width: 90vw;
            height: 80vh;
            right: 5vw;
            bottom: 80px;
        }
        .chatbox-button {
            width: 56px;
            height: 56px;
            font-size: 26px;
            bottom: 20px;
            right: 20px;
        }
    }
</style>

<!-- ===== CHATBOX HTML ===== -->
<div id="chatbox">
    <button class="chatbox-button" id="chatToggle">💬</button>

    <div class="chat-window" id="chatWindow">
        <div class="chat-header">
            <span>💬 Chat with Ravi</span>
            <button class="chat-close" id="chatClose">✕</button>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="message bot">Hi! 👋 Welcome to my portfolio.</div>
            <div class="message bot">Choose an option below to get started:</div>
        </div>

        <div class="mode-selection" id="modeSelection">
            <button class="mode-btn" id="aiModeBtn">🤖 AI Chat</button>
            <button class="mode-btn" id="contactModeBtn">📧 Contact Me</button>
        </div>

        <div id="aiChatMode" style="display:none; flex-direction:column; flex:1;">
            <div style="padding: 8px 16px; border-bottom: 1px solid rgba(255,255,255,0.06);">
                <button class="back-btn" id="aiBackBtn">← Back</button>
            </div>
            <div class="chat-messages" id="aiMessages"></div>
            <div class="chat-input-area">
                <input type="text" class="chat-input" id="aiInput" placeholder="Type your message...">
                <button class="chat-send" id="aiSend">Send</button>
            </div>
        </div>

        <div class="contact-form" id="contactForm">
            <div style="padding-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.06);">
                <button class="back-btn" id="contactBackBtn">← Back</button>
            </div>
            <input type="text" id="contactName" placeholder="Your Name" required>
            <input type="email" id="contactEmail" placeholder="Your Email" required>
            <textarea id="contactMessage" placeholder="Your Message" required></textarea>
            <button class="send-btn" id="contactSend">Send Message</button>
            <div id="contactStatus" style="text-align:center; font-size:14px; margin-top:4px;"></div>
        </div>
    </div>
</div>
