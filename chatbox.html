<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <style>
        /* ==============================
           ROOT VARIABLES (Dark/Light Mode)
        ============================== */
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #13131a;
            --bg-tertiary: #1a1a2e;
            --bg-input: rgba(255,255,255,0.04);
            --border-color: rgba(255,255,255,0.08);
            --text-primary: #f0f0f5;
            --text-secondary: #a0a0b0;
            --text-muted: #6a6a7a;
            --primary: #00d9ff;
            --secondary: #00ff88;
            --accent: #7c3aed;
            --gradient-bot: linear-gradient(135deg, var(--primary), var(--secondary));
            --gradient-user: linear-gradient(135deg, var(--accent), var(--primary));
            --shadow: 0 8px 40px rgba(0, 217, 255, 0.15);
            --radius: 16px;
            --radius-sm: 10px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --toggle-bg: rgba(255,255,255,0.05);
            --toggle-border: rgba(255,255,255,0.15);
            --toggle-text: #a0a0b0;
            --quick-btn-bg: rgba(255,255,255,0.06);
            --quick-btn-hover: rgba(0, 217, 255, 0.15);
        }

        /* Light Mode Overrides */
        [data-theme="light"] {
            --bg-primary: #f5f0eb;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f0ece6;
            --bg-input: rgba(0,0,0,0.04);
            --border-color: rgba(0,0,0,0.1);
            --text-primary: #1a1a1a;
            --text-secondary: #555;
            --text-muted: #999;
            --primary: #0984e3;
            --secondary: #00b894;
            --accent: #6c5ce7;
            --shadow: 0 8px 40px rgba(0, 0, 0, 0.1);
            --toggle-bg: rgba(0,0,0,0.05);
            --toggle-border: rgba(0,0,0,0.15);
            --toggle-text: #555;
            --quick-btn-bg: rgba(0,0,0,0.05);
            --quick-btn-hover: rgba(9, 132, 227, 0.1);
        }

        /* ==============================
           RESET
        ============================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-image: radial-gradient(ellipse at 50% 0%, rgba(0, 217, 255, 0.05) 0%, transparent 70%);
            transition: background var(--transition), color var(--transition);
        }

        [data-theme="light"] body {
            background-image: radial-gradient(ellipse at 50% 0%, rgba(9, 132, 227, 0.05) 0%, transparent 70%);
        }

        /* ==============================
           THEME TOGGLE (Fixed Position)
        ============================== */
        .theme-toggle-wrapper {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 9999;
            background: var(--bg-secondary);
            padding: 8px 16px 8px 20px;
            border-radius: 50px;
            border: 1px solid var(--toggle-border);
            box-shadow: var(--shadow);
            transition: all var(--transition);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        #themeLabel {
            font-size: 13px;
            font-weight: 500;
            color: var(--toggle-text);
            transition: color var(--transition);
            min-width: 42px;
        }

        .switch {
            position: relative;
            width: 50px;
            height: 26px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 4px;
            background: var(--toggle-bg);
            border-radius: 30px;
            border: 2px solid var(--toggle-border);
            transition: all var(--transition);
            flex-shrink: 0;
        }

        .switch .slider {
            position: absolute;
            top: 2px;
            left: 2px;
            width: 18px;
            height: 18px;
            background: var(--primary);
            border-radius: 50%;
            transition: all var(--transition);
            box-shadow: 0 2px 8px rgba(0, 217, 255, 0.3);
        }

        .switch .switch-icon {
            font-size: 13px;
            line-height: 1;
            z-index: 1;
            transition: opacity var(--transition);
        }

        .switch .sun { opacity: 1; }
        .switch .moon { opacity: 0.3; }

        [data-theme="dark"] .switch .sun { opacity: 0.3; }
        [data-theme="dark"] .switch .moon { opacity: 1; }

        [data-theme="dark"] .switch .slider {
            left: 26px;
            background: var(--primary);
        }

        [data-theme="dark"] .switch {
            border-color: var(--primary);
        }

        .switch:hover {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.15);
        }

        /* ==============================
           TOAST
        ============================== */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px 24px;
            color: var(--text-secondary);
            font-size: 14px;
            z-index: 10001;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
            box-shadow: var(--shadow);
            font-family: 'Space Grotesk', sans-serif;
        }

        .toast.show {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        /* ==============================
           CHATBOX CONTAINER
        ============================== */
        .chatbox-container {
            width: 100%;
            max-width: 480px;
            height: 90vh;
            max-height: 700px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: var(--shadow);
            position: relative;
            transition: all var(--transition);
        }

        /* ==============================
           HEADER
        ============================== */
        .chat-header {
            padding: 20px 24px;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 14px;
            flex-shrink: 0;
            transition: all var(--transition);
        }

        .chat-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
            border: 2px solid var(--primary);
            background: var(--bg-secondary);
            transition: border-color var(--transition);
        }

        .chat-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .chat-header-info {
            flex: 1;
        }

        .chat-header-info h2 {
            font-size: 17px;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.2;
            transition: color var(--transition);
        }

        .chat-header-info .status {
            font-size: 12px;
            color: var(--secondary);
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color var(--transition);
        }

        .chat-header-info .status::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--secondary);
            animation: pulse-dot 1.5s infinite;
            transition: background var(--transition);
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.8); }
        }

        .chat-header-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 22px;
            cursor: pointer;
            transition: var(--transition);
            padding: 4px;
            line-height: 1;
        }

        .chat-header-close:hover {
            color: #ff4444;
            transform: rotate(90deg);
        }

        /* ==============================
           MESSAGES AREA
        ============================== */
        .chat-messages {
            flex: 1;
            padding: 20px 18px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }

        .chat-messages::-webkit-scrollbar {
            width: 4px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }

        /* ==============================
           QUICK REPLY BUTTONS
        ============================== */
        .quick-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 8px 0 4px 0;
            flex-shrink: 0;
            justify-content: center;
        }

        .quick-btn {
            background: var(--quick-btn-bg);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 12px;
            font-family: inherit;
            cursor: pointer;
            transition: all var(--transition);
            white-space: nowrap;
        }

        .quick-btn:hover {
            background: var(--quick-btn-hover);
            border-color: var(--primary);
            color: var(--text-primary);
            transform: translateY(-2px);
        }

        /* ==============================
           MESSAGE BUBBLES
        ============================== */
        .message {
            max-width: 85%;
            padding: 12px 18px;
            border-radius: var(--radius-sm);
            font-size: 15px;
            line-height: 1.6;
            animation: msgIn 0.35s ease;
            position: relative;
            word-wrap: break-word;
        }

        @keyframes msgIn {
            from { opacity: 0; transform: translateY(12px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .message.bot {
            align-self: flex-start;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
            transition: all var(--transition);
        }

        .message.bot .msg-time {
            color: var(--text-muted);
        }

        .message.user {
            align-self: flex-end;
            background: var(--gradient-user);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .message.user .msg-time {
            color: rgba(255,255,255,0.6);
        }

        .msg-time {
            font-size: 10px;
            opacity: 0.6;
            margin-top: 6px;
            display: block;
            text-align: right;
        }

        /* Typing Indicator */
        .typing-indicator {
            align-self: flex-start;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            border-bottom-left-radius: 4px;
            padding: 14px 20px;
            display: none;
            align-items: center;
            gap: 6px;
            transition: all var(--transition);
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
            animation: typingBounce 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-8px); }
        }

        /* ==============================
           INPUT AREA
        ============================== */
        .chat-input-area {
            padding: 12px 20px 16px 20px;
            background: var(--bg-tertiary);
            border-top: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex-shrink: 0;
            transition: all var(--transition);
        }

        .chat-input-row {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .chat-input-area input {
            flex: 1;
            padding: 12px 18px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 50px;
            color: var(--text-primary);
            font-size: 15px;
            font-family: inherit;
            outline: none;
            transition: var(--transition);
        }

        .chat-input-area input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.1);
        }

        .chat-input-area input::placeholder {
            color: var(--text-muted);
        }

        .chat-input-area button {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: var(--gradient-bot);
            color: #0a0a0f;
            font-size: 20px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .chat-input-area button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 217, 255, 0.4);
        }

        .chat-input-area button:active {
            transform: scale(0.92);
        }

        .chat-input-area button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* ==============================
           FOOTER
        ============================== */
        .chat-footer {
            text-align: center;
            padding: 10px 20px;
            font-size: 11px;
            color: var(--text-muted);
            border-top: 1px solid var(--border-color);
            flex-shrink: 0;
            background: var(--bg-secondary);
            transition: all var(--transition);
        }

        .chat-footer a {
            color: var(--primary);
            text-decoration: none;
            transition: color var(--transition);
        }

        .chat-footer a:hover {
            text-decoration: underline;
        }

        /* ==============================
           EMPTY STATE
        ============================== */
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            text-align: center;
            padding: 30px;
            transition: color var(--transition);
        }

        .empty-state .icon {
            font-size: 56px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 20px;
            color: var(--text-secondary);
            margin-bottom: 6px;
            transition: color var(--transition);
        }

        .empty-state p {
            font-size: 14px;
            max-width: 260px;
            line-height: 1.6;
        }

        /* ==============================
           RESPONSIVE
        ============================== */
        @media (max-width: 500px) {
            .chatbox-container {
                height: 100vh;
                max-height: 100vh;
                border-radius: 0;
                border: none;
                max-width: 100%;
            }
            body { padding: 0; }
            .chat-header { padding: 16px 18px; }
            .chat-messages { padding: 16px 14px; }
            .chat-input-area { padding: 10px 14px 14px 14px; }
            .message { max-width: 92%; font-size: 14px; }

            .theme-toggle-wrapper {
                top: 10px;
                right: 10px;
                padding: 4px 10px 4px 14px;
                gap: 6px;
            }

            #themeLabel {
                font-size: 10px;
                min-width: 28px;
            }

            .switch {
                width: 36px;
                height: 20px;
            }

            .switch .slider {
                width: 12px;
                height: 12px;
                top: 2px;
                left: 2px;
            }

            [data-theme="dark"] .switch .slider {
                left: 18px;
            }

            .switch .switch-icon {
                font-size: 9px;
            }

            .quick-btn {
                font-size: 10px;
                padding: 4px 10px;
            }
        }

        @media (max-width: 768px) {
            .theme-toggle-wrapper {
                top: 15px;
                right: 15px;
                padding: 6px 12px 6px 16px;
                gap: 8px;
            }

            #themeLabel {
                font-size: 11px;
                min-width: 34px;
            }

            .switch {
                width: 42px;
                height: 22px;
            }

            .switch .slider {
                width: 14px;
                height: 14px;
            }

            [data-theme="dark"] .switch .slider {
                left: 22px;
            }

            .switch .switch-icon {
                font-size: 10px;
            }
        }
    </style>
</head>

                },

                detectPersona(text) {
                    const t = text.toLowerCase();
                    let maxScore = 0;
                    let detected = 'general';

                    for (const [persona, data] of Object.entries(this.knowledgeBase)) {
                        let score = 0;
                        for (const keyword of data.keywords) {
                            if (t.includes(keyword)) score++;
                        }
                        if (score > maxScore) {
                            maxScore = score;
                            detected = persona;
                        }
                    }
                    return detected;
                },

                detectMood(text) {
                    const t = text.toLowerCase();
                    if (t.match(/sad|depressed|lonely|bura|pareshan|tension|worried|stress|panic|anxiety|grief|heartbroken|alone|hopeless|failure|cry|upset|hurt|pain|suffer|struggle|worry|fear/)) return 'sad';
                    if (t.match(/happy|excited|awesome|great|wow|maza|accha|badhiya|wonderful|amazing|fantastic|brilliant|love it|enjoy|fun|celebrate|cheerful|joy|grateful|proud|blessed|elated|thrilled/)) return 'happy';
                    if (t.match(/angry|frustrated|gussa|nahi chal raha|error|bug|annoyed|irritated|rage|furious|upset|disappointed|betrayed|jealous|impatient|hate|useless|worst|terrible|fed up|sick of|tired of|done with/)) return 'angry';
                    if (t.match(/curious|interesting|tell more|explain|how|why|what|when|where|who|want to know|understand|clarify|elaborate|details|specify|define|describe|uncover|discover|learn|knowledge|insight/)) return 'curious';
                    if (t.match(/funny|haha|lol|rofl|lmfao|hilarious|comedy|joke|meme|fun|entertaining|amusing|humorous|witty|clever|smart|sarcastic/)) return 'humorous';
                    if (t.match(/scared|fear|terrified|horror|nightmare|spooky|creepy|weird|strange|unusual|odd|bizarre/)) return 'scared';
                    return 'neutral';
                },

                detectIntent(text) {
                    const t = text.toLowerCase();
                    if (t.match(/^(hello|hi|hey|namaste|hola)/)) return 'greeting';
                    if (t.match(/\?$/)) return 'question';
                    if (t.match(/help|support|assist|guide|explain/i)) return 'help';
                    if (t.match(/complaint|problem|issue|error|bug|not working/i)) return 'complaint';
                    if (t.match(/thank|thanks|thank you|shukriya|dhanyavaad/i)) return 'gratitude';
                    if (t.match(/bye|goodbye|tata|see you|phir milte|godbye/i)) return 'farewell';
                    if (t.match(/joke|funny|haha|lol|rofl|meme/i)) return 'fun';
                    return 'general';
                },

                getSmartReply(msg) {
                    const t = msg.toLowerCase().trim();

                    // Adult content filter
                    if (t.match(/x-rated|adult|porn|sex|nangi|hot video|xxx|18\+|nsfw|explicit|mature content|erotic|vulgar|obscene|lewd|indecent|profanity|swear|cuss|fuck|shit|bitch|asshole|bastard|dick|pussy|cunt|tits|boobs|breasts|ass|butt|penis|vagina/)) {
                        return "Sorry, main professional assistant hoon! 😊 Kuch aur pucho jo main help kar sakta hoon.";
                    }

                    const persona = this.detectPersona(t);
                    const mood = this.detectMood(t);
                    const intent = this.detectIntent(t);

                    // Persona-based reply
                    if (persona !== 'general' && this.knowledgeBase[persona]) {
                        const kb = this.knowledgeBase[persona];
                        let matchedKey = null;
                        for (const key in kb.replies) {
                            if (t.includes(key)) {
                                matchedKey = key;
                                break;
                            }
                        }
                        if (matchedKey) {
                            const replies = kb.replies[matchedKey];
                            let reply = replies[Math.floor(Math.random() * replies.length)];
                            // Mood adjustment
                            if (mood === 'sad') reply += " ❤️ Main hoon na!";
                            else if (mood === 'happy') reply += " 😄 Tumhara excitement contagious hai!";
                            else if (mood === 'angry') reply += " 🤝 Let's solve this together!";
                            return reply;
                        }
                        const fallbacks = {
                            student: "Student life mein maza aata hai! 📚 Kya seekh rahe ho?",
                            parent: "Babu ji, main apna best de raha hoon! 🙏",
                            recruiter: "I'd love to discuss my skills! 💼",
                            romantic: "Love is beautiful! ❤️",
                            casual: "Life is fun! 😄 Kya chal raha hai?",
                            tech: "Technology is amazing! 🔥",
                            business: "Business is about solving problems! 💡"
                        };
                        return fallbacks[persona] || "That's interesting! Tell me more! 🤔";
                    }

                    // Greeting
                    if (intent === 'greeting') {
                        const greetings = [
                            "Hello! 👋 Kaise ho? Kya help chahiye?",
                            "Namaste! 🙏 Welcome! How can I assist you today?",
                            "Hey there! 😊 What brings you here?",
                            "Hi! 💫 I'm Ravi's AI assistant. What's on your mind?"
                        ];
                        return greetings[Math.floor(Math.random() * greetings.length)];
                    }

                    // Farewell
                    if (intent === 'farewell') {
                        const farewells = [
                            "Bye bye! 👋 Take care! Phir milte hain!",
                            "Goodbye! 😊 It was nice chatting with you!",
                            "Tata! 🎉 Come back anytime!",
                            "See you soon! 🌟 Have a great day!"
                        ];
                        return farewells[Math.floor(Math.random() * farewells.length)];
                    }

                    // Gratitude
                    if (intent === 'gratitude') {
                        const thanks = [
                            "Welcome! 😊 Happy to help!",
                            "My pleasure! ❤️ Keep shining!",
                            "Anytime! 💫 You're awesome!"
                        ];
                        return thanks[Math.floor(Math.random() * thanks.length)];
                    }

                    // Name
                    if (t.includes('name')) {
                        return "I'm RJ AI — Ravi Raj's virtual assistant! 🤖";
                    }

                    // Time
                    if (t.includes('time')) {
                        const now = new Date();
                        return `Time is ${now.toLocaleTimeString()} ⏰ Let's make the most of it!`;
                    }

                    // Joke
                    if (intent === 'fun' || t.includes('joke')) {
                        const jokes = [
                            "Why do programmers prefer dark mode? Because light attracts bugs! 😄",
                            "What do you call a programmer from Finland? Nerdic! 😂",
                            "Why did the developer go broke? Because he used up all his cache! 💰",
                            "A SQL query walks into a bar, sees two tables and asks... 'Can I join you?' 😆"
                        ];
                        return jokes[Math.floor(Math.random() * jokes.length)];
                    }

                    // Help
                    if (intent === 'help') {
                        return "Main yahan help karne ke liye hoon! 💪 Kya problem hai? Batao! 😊";
                    }

                    // Complaint
                    if (intent === 'complaint') {
                        return "Arre! 😮 Kya problem hai? Main sun raha hoon. Saath mein solve karenge! 🤝";
                    }

                    // Fallback
                    const fallbacks = [
                        "Accha sawaal hai! 🤔 Thoda aur detail mein batao?",
                        "Main samajh gaya... ❓ Kya aap iske baare mein poochh rahe ho?",
                        "Interesting! 📚 Kya aap specific kuch poochhna chahte ho?",
                        "Hmm... 🤔 Let me think. Thoda aur context do?"
                    ];
                    return fallbacks[Math.floor(Math.random() * fallbacks.length)];
                },

                getContextualReply(userMessage) {
                    this.lastActive = Date.now();
                    const reply = this.getSmartReply(userMessage);
                    this.history.push({ message: userMessage, reply, timestamp: Date.now() });
                    if (this.history.length > 200) this.history.shift();
                    return reply;
                }
            };

            // ============================================================
            // UI FUNCTIONS
            // ============================================================
            function getTime() {
                const now = new Date();
                return String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
            }

            function scrollToBottom() {
                if (DOM.messages) {
                    DOM.messages.scrollTop = DOM.messages.scrollHeight;
                }
            }

            function addMessage(text, sender) {
                if (!DOM.messages) return;
                if (DOM.empty) DOM.empty.style.display = 'none';
                const div = document.createElement('div');
                div.className = `message ${sender}`;
                div.innerHTML = `${text}<span class="msg-time">${getTime()}</span>`;
                DOM.messages.appendChild(div);
                // Insert quick buttons before input area
                if (DOM.quickBtns) {
                    DOM.messages.appendChild(DOM.quickBtns);
                }
                scrollToBottom();
            }

            function showTyping() {
                if (DOM.typing) {
                    DOM.typing.style.display = 'flex';
                    scrollToBottom();
                }
            }

            function hideTyping() {
                if (DOM.typing) {
                    DOM.typing.style.display = 'none';
                }
            }

            // ============================================================
            // QUICK REPLY BUTTONS
            // ============================================================
            function generateQuickReplies() {
                if (!DOM.quickBtns) return;
                const buttons = [
                    { text: '👋 Hello', value: 'Hello' },
                    { text: '📚 Coding', value: 'Coding kaise seekhni hai?' },
                    { text: '💼 Skills', value: 'What skills do you have?' },
                    { text: '❤️ Love', value: 'Pyaar ke baare mein batao' },
                    { text: '😂 Joke', value: 'Tell me a joke' },
                    { text: '💡 Help', value: 'Help' },
                    { text: '🚀 Future', value: 'Future plans kya hain?' },
                    { text: '🏠 Ghar', value: 'Ghar ki yaad aa rahi hai' }
                ];

                DOM.quickBtns.innerHTML = '';
                buttons.forEach(btn => {
                    const el = document.createElement('button');
                    el.className = 'quick-btn';
                    el.textContent = btn.text;
                    el.addEventListener('click', function(e) {
                        e.stopPropagation();
                        if (DOM.input) {
                            DOM.input.value = btn.value;
                            sendMessage();
                        }
                    });
                    DOM.quickBtns.appendChild(el);
                });
            }

            // ============================================================
            // SEND MESSAGE
            // ============================================================
            let isProcessing = false;

            function sendMessage() {
                if (!DOM.input || !DOM.send) return;
                const text = DOM.input.value.trim();
                if (!text || isProcessing) return;

                addMessage(text, 'user');
                DOM.input.value = '';
                DOM.input.focus();

                isProcessing = true;
                DOM.send.disabled = true;
                showTyping();

                const delay = 600 + Math.random() * 1200 + (text.length / 10) * 50;
                setTimeout(function() {
                    hideTyping();
                    const reply = Engine.getContextualReply(text);
                    addMessage(reply, 'bot');
                    isProcessing = false;
                    DOM.send.disabled = false;
                }, delay);
            }

            // ============================================================
            // INACTIVITY DETECTION
            // ============================================================
            setInterval(function() {
                const inactiveTime = Date.now() - Engine.lastActive;
                if (inactiveTime > 120000 && !isProcessing) {
                    const messages = [
                        "Kya hua? 🤔 Kuch soch rahe ho?",
                        "Main yahan hoon! 😊 Koi baat karo?",
                        "Zinda ho? 😄 Batao kya help chahiye?"
                    ];
                    addMessage(messages[Math.floor(Math.random() * messages.length)], 'bot');
                    Engine.lastActive = Date.now();
                }
            }, 60000);

            // ============================================================
            // EVENT LISTENERS
            // ============================================================
            if (DOM.send) {
                DOM.send.addEventListener('click', function(e) {
                    e.preventDefault();
                    sendMessage();
                });
            }

            if (DOM.input) {
                DOM.input.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        sendMessage();
                    }
                });
            }

            // ============================================================
            // CLOSE CHATBOX
            // ============================================================
            window.closeChatbox = function() {
                if (document.referrer) {
                    window.location.href = document.referrer;
                } else {
                    window.history.back();
                }
            };

            // ============================================================
            // KEYBOARD SHORTCUTS
            // ============================================================
            document.addEventListener('keydown', function(e) {
                if ((e.ctrlKey || e.metaKey) && e.key === '/') {
                    e.preventDefault();
                    if (DOM.input) DOM.input.focus();
                }
                if (e.key === 'Escape') {
                    window.closeChatbox();
                }
            });

            // ============================================================
            // INIT
            // ============================================================
            generateQuickReplies();
            setTimeout(function() {
                if (DOM.input) DOM.input.focus();
            }, 300);

            console.log('🤖 RJ AI Chatbox — Ultra Advanced v5.0');
            console.log('🧠 7 Personas | 6 Moods | Multiple Intents');
            console.log('⚡ Dynamic Quick Replies | Inactivity Detection');
            console.log('🔥 Built by Ravi Raj');
            console.log('💡 Tip: Press Ctrl+/ to focus input, Escape to close.');

        })();
    </script>

    <!-- ============================================================
    JAVASCRIPT — THEME TOGGLE
    ============================================================ -->
    <script>
        (function() {
            'use strict';

            const themeSwitch = document.getElementById('themeSwitch');
            const themeLabel = document.getElementById('themeLabel');
            const toast = document.getElementById('toast');
            const html = document.documentElement;

            // Load saved theme
            const currentTheme = localStorage.getItem('theme') || 'light';
            html.setAttribute('data-theme', currentTheme);
            themeLabel.textContent = currentTheme === 'dark' ? 'Dark' : 'Light';

            // Toggle click
            themeSwitch.addEventListener('click', function(e) {
                e.stopPropagation();
                const current = html.getAttribute('data-theme');
                const next = current === 'light' ? 'dark' : 'light';
                html.setAttribute('data-theme', next);
                localStorage.setItem('theme', next);
                themeLabel.textContent = next === 'dark' ? 'Dark' : 'Light';
                showToast(next === 'dark' ? '🌙 Dark Mode' : '☀️ Light Mode');
            });

            // Keyboard support
            themeSwitch.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    this.click();
                }
            });

            // Toast function
            let toastTimer;

            function showToast(message) {
                if (!toast) return;
                clearTimeout(toastTimer);
                toast.textContent = message;
                toast.className = 'toast show';
                toastTimer = setTimeout(function() {
                    toast.classList.remove('show');
                }, 2000);
            }

            // Responsive toggle position
            function adjustTogglePosition() {
                const wrapper = document.querySelector('.theme-toggle-wrapper');
                if (!wrapper) return;
                if (window.innerWidth <= 480) {
                    wrapper.style.top = '10px';
                    wrapper.style.right = '10px';
                } else if (window.innerWidth <= 768) {
                    wrapper.style.top = '15px';
                    wrapper.style.right = '15px';
                } else {
                    wrapper.style.top = '20px';
                    wrapper.style.right = '20px';
                }
            }

            adjustTogglePosition();
            window.addEventListener('resize', adjustTogglePosition);

            console.log('✅ Chatbox with Dark/Light Toggle Loaded!');
        })();
    </script>
