<!-- social-widget.html -->
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Space Grotesk', sans-serif;
        }

        /* Social Dropdown */
        .social-wrapper {
            position: relative;
            display: inline-block;
        }

        .social-trigger {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 24px;
            background: rgba(0, 217, 255, 0.1);
            border: 2px solid #00d9ff;
            border-radius: 50px;
            color: #00d9ff;
            font-family: 'Fira Code', monospace;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
            user-select: none;
        }

        .social-trigger:hover {
            background: rgba(0, 217, 255, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 217, 255, 0.3);
        }

        .social-trigger .arrow {
            font-size: 12px;
            transition: 0.3s;
        }

        .social-trigger.active .arrow {
            transform: rotate(180deg);
        }

        /* Dropdown Menu */
        .social-menu {
            position: absolute;
            top: calc(100% + 10px);
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background: #13131a;
            border: 1px solid rgba(0, 217, 255, 0.3);
            border-radius: 14px;
            padding: 10px;
            min-width: 220px;
            opacity: 0;
            visibility: hidden;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
        }

        .social-menu.show {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) scale(1);
        }

        .social-menu::before {
            content: '';
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-bottom: 8px solid #00d9ff;
        }

        .social-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            color: #e4e4e7;
            text-decoration: none;
            border-radius: 10px;
            transition: 0.3s;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .social-link:last-child {
            border-bottom: none;
        }

        .social-link:hover {
            background: rgba(0, 217, 255, 0.1);
            transform: translateX(5px);
        }

        .social-link i {
            font-size: 20px;
            width: 28px;
            text-align: center;
        }

        .social-link .name {
            font-size: 14px;
            font-weight: 500;
            flex: 1;
        }

        .social-link .username {
            font-size: 12px;
            color: #71717a;
            font-family: 'Fira Code', monospace;
        }

        .social-link:hover .username {
            color: #e4e4e7;
        }

        /* Hover Colors */
        .social-link:hover .fa-x-twitter { color: #1DA1F2; }
        .social-link:hover .fa-instagram { color: #E4405F; }
        .social-link:hover .fa-linkedin-in { color: #0A66C2; }
        .social-link:hover .fa-youtube { color: #FF0000; }
        .social-link:hover .fa-github { color: #6e5494; }

        /* Light Mode */
        body.light-mode .social-menu {
            background: #ffffff;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        }

        body.light-mode .social-menu::before {
            border-bottom-color: #00d9ff;
        }

        body.light-mode .social-link {
            color: #1a1a1a;
            border-bottom-color: rgba(0, 0, 0, 0.05);
        }

        body.light-mode .social-link:hover {
            background: rgba(0, 217, 255, 0.1);
        }

        body.light-mode .social-link .username {
            color: #888;
        }

        body.light-mode .social-link:hover .username {
            color: #1a1a1a;
        }

        /* Mobile */
        @media (max-width: 768px) {
            .social-menu {
                min-width: 200px;
                padding: 8px;
            }
            .social-link {
                padding: 8px 12px;
                font-size: 13px;
            }
            .social-link i {
                font-size: 18px;
                width: 24px;
            }
            .social-link .username {
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <!-- Social Widget HTML -->
    <div class="social-wrapper" id="socialWidget">
        <div class="social-trigger" id="triggerBtn">
            <span>@rravirajhere</span>
            <span class="arrow">▼</span>
        </div>
        <div class="social-menu" id="socialMenu">
            <a href="https://twitter.com/Raviraj2k09" target="_blank" class="social-link">
                <i class="fab fa-x-twitter"></i>
                <span class="name">Twitter</span>
                <span class="username">@Raviraj2k09</span>
            </a>
            <a href="#" onclick="alert('Instagram Coming Soon!'); return false;" class="social-link">
                <i class="fab fa-instagram"></i>
                <span class="name">Instagram</span>
                <span class="username">@rravirajhere</span>
            </a>
            <a href="https://linkedin.com/in/Ravirajhere" target="_blank" class="social-link">
                <i class="fab fa-linkedin-in"></i>
                <span class="name">LinkedIn</span>
                <span class="username">@Ravirajhere</span>
            </a>
            <a href="https://youtube.com/@Ravirajhere" target="_blank" class="social-link">
                <i class="fab fa-youtube"></i>
                <span class="name">YouTube</span>
                <span class="username">@Ravirajhere</span>
            </a>
            <a href="#" onclick="alert('GitHub Coming Soon!'); return false;" class="social-link">
                <i class="fab fa-github"></i>
                <span class="name">GitHub</span>
                <span class="username">@rravirajhere</span>
            </a>
        </div>
    </div>

    <!-- JavaScript -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const trigger = document.getElementById('triggerBtn');
            const menu = document.getElementById('socialMenu');
            
            if (trigger && menu) {
                trigger.addEventListener('click', function(e) {
                    e.stopPropagation();
                    this.classList.toggle('active');
                    menu.classList.toggle('show');
                });
                
                document.addEventListener('click', function(e) {
                    if (!trigger.contains(e.target) && !menu.contains(e.target)) {
                        trigger.classList.remove('active');
                        menu.classList.remove('show');
                    }
                });
            }
        });
    </script>
</body>
</html>
